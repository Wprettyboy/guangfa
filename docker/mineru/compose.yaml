name: guangfa-mineru

x-mineru-common: &mineru-common
  build:
    context: ../..
    dockerfile: docker/mineru/Dockerfile
  image: guangfa/mineru:3.4.4
  restart: unless-stopped
  ipc: host
  ulimits:
    memlock: -1
    stack: 67108864

services:
  mineru-vlm:
    <<: *mineru-common
    container_name: guangfa-mineru-vlm
    entrypoint: mineru-openai-server
    command:
      - --host
      - 0.0.0.0
      - --port
      - "30000"
      - --served-model-name
      - "${MINERU_VL_MODEL_NAME:-opendatalab/MinerU2.5-Pro-2605-1.2B}"
      - --gpu-memory-utilization
      - "${MINERU_VLM_GPU_MEMORY_UTILIZATION:-0.55}"
    environment:
      MINERU_MODEL_SOURCE: local
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:30000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 120
      start_period: 5m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${MINERU_VLM_GPU_DEVICE:-0}"]
              capabilities: [gpu]

  mineru-api:
    <<: *mineru-common
    container_name: guangfa-mineru-api
    depends_on:
      mineru-vlm:
        condition: service_healthy
    entrypoint: mineru-api
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --allow-public-http-client
    ports:
      - "127.0.0.1:${MINERU_API_PORT:-8010}:8000"
    environment:
      MINERU_MODEL_SOURCE: local
      MINERU_API_OUTPUT_ROOT: /data/output
      MINERU_API_MAX_CONCURRENT_REQUESTS: "1"
      MINERU_PROCESSING_WINDOW_SIZE: "${MINERU_PROCESSING_WINDOW_SIZE:-16}"
      MINERU_HYBRID_BATCH_RATIO: "${MINERU_HYBRID_BATCH_RATIO:-1}"
      MINERU_VL_MODEL_NAME: "${MINERU_VL_MODEL_NAME:-opendatalab/MinerU2.5-Pro-2605-1.2B}"
    volumes:
      - mineru-output:/data/output
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 1m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${MINERU_API_GPU_DEVICE:-0}"]
              capabilities: [gpu]

volumes:
  mineru-output:
